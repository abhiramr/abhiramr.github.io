<script>
(function () {
  // Perceptually distinct hues, well-spread across the wheel.
  // Gaps at muddy yellow (55-80°) and near-yellow lime intentionally avoided.
  var HUES = [211, 155, 262, 336, 20, 142, 188, 291, 352, 38, 168, 243];
  //          blue teal  purp pink org  grn  cyan viol red  amb  jade indigo

  function tagHue(str) {
    var h = 5381;
    for (var i = 0; i < str.length; i++) {
      h = ((h << 5) + h) ^ str.charCodeAt(i);
      h = h & h; // keep 32-bit
    }
    return HUES[Math.abs(h) % HUES.length];
  }

  function colorize() {
    var els = document.querySelectorAll('.post-tags a, .terms-tags a');
    for (var i = 0; i < els.length; i++) {
      var tag = els[i].textContent.trim().toLowerCase();
      els[i].style.setProperty('--tag-h', tagHue(tag));
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', colorize);
  } else {
    colorize();
  }
})();
</script>
<script>
(function () {
  var menu = document.getElementById('menu');
  if (!menu) return;

  var button = document.createElement('button');
  button.className = 'menu-toggle';
  button.type = 'button';
  button.setAttribute('aria-label', 'Open navigation menu');
  button.setAttribute('aria-controls', 'menu');
  button.setAttribute('aria-expanded', 'false');
  button.innerHTML = '<span></span><span></span><span></span>';
  menu.parentNode.insertBefore(button, menu);

  function closeMenu() {
    menu.classList.remove('is-open');
    button.classList.remove('is-open');
    button.setAttribute('aria-expanded', 'false');
    button.setAttribute('aria-label', 'Open navigation menu');
  }

  button.addEventListener('click', function () {
    var isOpen = menu.classList.toggle('is-open');
    button.classList.toggle('is-open', isOpen);
    button.setAttribute('aria-expanded', String(isOpen));
    button.setAttribute('aria-label', isOpen ? 'Close navigation menu' : 'Open navigation menu');
  });

  document.addEventListener('click', function (event) {
    if (!menu.contains(event.target) && !button.contains(event.target)) closeMenu();
  });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'Escape') {
      closeMenu();
      button.focus();
    }
  });
})();
</script>
