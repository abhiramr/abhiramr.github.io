baseURL = "https://abhiramr.com/"
title = "Abhiram R"
theme = "PaperMod"
paginate = 20
enableRobotsTXT = true
buildDrafts = false
languageCode = "en-us"

mainSections = ["blog"]

[params]
  author = "Abhiram R"
  description = "Senior software engineer building production-grade generative AI integrations for O9's supply chain platform."
  defaultTheme = "auto"
  homeLatestCount = 4
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  pygmentsUseClasses = true
  googleAnalytics = "G-NK6FWGKQPH"

[params.homeInfoParams]
  Title = "Hi. I'm Abhiram"
  Content = "I’m a senior software engineer building production-grade generative AI integrations for O9's supply chain platform.\n\nI write about the things that hold my attention, from engineering and GenAI to short stories and small day-to-day happenings.\n\nI also run one of Bangalore's longest running bookclubs, [Broke Bibliophiles Bangalore](https://brokebibliophilesbangalore.substack.com)."

